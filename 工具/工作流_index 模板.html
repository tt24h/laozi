<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{DOC_TITLE}}</title>

    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker 注册成功'))
            .catch(err => console.log('注册失败', err));
        });
      }
    </script>
    <style>
        :root {
            --bg-body: #ffffff;
            --bg-pre: #f6f8fa;
            --text-main: #24292e;
            --text-ancient: #000000;
            --border-color: #e1e4e8;
            --hr-color: #eaecef;
            --line-height: 1.8;
        }

        body.dark-mode {

            --bg-body: #212830;     
            --bg-pre: #2d333b;    

            --text-main: #D1D7E0;   
            --text-ancient: #D1D7E0;
            
            --border-color: #444c56; 
            --hr-color: #373e47;     
        }

        body {
            font-family: sans-serif;
            font-size: 20px;
            line-height: var(--line-height);
            color: var(--text-main);
            background-color: var(--bg-body);
            max-width: 800px;
            margin: 40px auto;
            padding: 0 15px;
            transition: background-color 0.2s, color 0.2s;
        }

        .header-info {
            background: var(--bg-pre);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        .controls {
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .controls label {
            white-space: nowrap; 
        }


        #chapterSelect {
            display: block;      
            margin-top: 12px; 
            padding: 8px;   
            background: var(--bg-pre);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            width: 8em;
        }

        h3 {
            background-color: var(--bg-body); 
            font-weight: normal;
            margin: 0; 
            padding: 15px 0;
            text-align: center;
            z-index: 100;
        }

        .ancient {
            margin: 20px 0 10px 0;
            color: var(--text-ancient);
        }

        pre {
            background-color: var(--bg-pre);
            padding: 14px;
            font-family: "Cascadia Code", "Consolas", "Liberation Mono", "Courier New", monospace;
            font-size: 0.94em;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            white-space: pre-wrap; 
            word-wrap: break-word;
            overflow-x: auto;
            line-height: var(--line-height);
            mask-image: radial-gradient(white, black);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        pre.no-wrap {
            white-space: pre;
            word-wrap: normal;
        }

        .meta-data {
            border: none !important;
            background-color: var(--bg-pre);
            white-space: pre !important; 
            word-wrap: normal !important;
            overflow-x: auto;
            
            padding: 0 !important; 
            margin: 0 0 15px 0;
        }

        body.hide-translation pre:not(.meta-data) {
            display: none;
        }

        #backToTop {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            width: 45px;
            height: 45px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            background-color: var(--bg-pre); 
            color: var(--text-main);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #backToTop:hover {
            transform: scale(0.95);
            background-color: var(--border-color);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 0.85em;
            border-top: 1px solid var(--hr-color);
            padding-top: 20px;
            padding-bottom: 20px;
        }

        ::-webkit-scrollbar {
            width: 10px; 
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-body);
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: var(--border-color); 
            background-clip: content-box;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="header-info">
<pre class="meta-data">{{DOC_META}}</pre>
    
    <div class="controls">
        <label><input type="checkbox" id="toggleNoWrap"> 译文块不换行</label>
        <label><input type="checkbox" id="toggleHideTranslation"> 仅显示原文</label>
        <label><input type="checkbox" id="toggleDark"> 深色模式</label>
    </div>


    <select id="chapterSelect">
        <option value="">跳转...</option>
            {{CHAPTER_OPTIONS}}
    </select>
</div>

<main>
    {{DOC_CONTENT}}
</main>

<button id="backToTop" title="回到顶部">↑</button>

<footer class="footer">
    ~~~ End ~~~
</footer>

<script>
    document.getElementById('toggleNoWrap').addEventListener('change', function() {
        document.querySelectorAll('pre').forEach(pre => {
            this.checked ? pre.classList.add('no-wrap') : pre.classList.remove('no-wrap');
        });
    });

    document.getElementById('toggleDark').addEventListener('change', function() {
        this.checked ? document.body.classList.add('dark-mode') : document.body.classList.remove('dark-mode');
    });

    document.getElementById('toggleHideTranslation').addEventListener('change', function() {
        if (this.checked) {
            document.body.classList.add('hide-translation');
        } else {
            document.body.classList.remove('hide-translation');
        }
    });

    document.getElementById('chapterSelect').addEventListener('change', function() {
        if (!this.value) return; 
        document.getElementById(this.value)?.scrollIntoView({ behavior: 'smooth' });
    });


    document.getElementById('backToTop').addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>

</body>
</html>
